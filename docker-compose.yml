services:
    mysql:
        image: mysql:8.4
        ports:
            - '3306:3306'
        environment:
            MYSQL_DATABASE: laravel
            MYSQL_USER: sail
            MYSQL_PASSWORD: password
            MYSQL_ROOT_PASSWORD: password
        volumes:
            - mysql-data:/var/lib/mysql
        healthcheck:
            test: [CMD, mysqladmin, ping, -ppassword]
            retries: 5
            interval: 5s

    backend:
        build: ./backend
        env_file: ./backend/.env
        environment:
            DB_HOST: mysql
        depends_on:
            mysql:
                condition: service_healthy

    frontend:
        build: ./frontend
        ports:
            - '80:80'
        depends_on:
            - backend

volumes:
    mysql-data:
